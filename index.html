<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Music Site</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #222;
    }

    .song {
      margin: 20px;
      padding: 15px;
      background: #1e1e1e;
      border-radius: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #ff1e4d;
    }
  </style>
</head>
<body>

<header>
  <h1>🎵 My Music Site</h1>
  <p>Welcome to my music collection</p>
</header>

<div class="song">
  <h3>Song 1</h3>
  <audio controls>
    <source src="song1.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="song">
  <h3>Song 2</h3>
  <audio controls>
    <source src="song2.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="song">
  <h3>Song 3</h3>
  <audio controls>
    <source src="song3.mp3" type="audio/mpeg">
  </audio>
</div>

</body>
</html>
