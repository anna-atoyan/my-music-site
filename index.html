<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundshelf — Music Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #8a8784;
    --accent: #c8b8a2;
    --accent2: #e8d5c0;
    --purple: #9b8edf;
    --teal: #5ecfaa;
    --coral: #e87d5a;
    --amber: #e8b84b;
    --blue: #5da8e8;
    --pink: #e87da8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 64px;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .logo-mark {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--coral));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .search-bar {
    flex: 1; max-width: 380px;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 9px 16px 9px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input::placeholder { color: var(--muted); }
  .search-bar input:focus { border-color: var(--border2); }
  .search-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn-add {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 99px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .btn-add:hover { opacity: 0.85; }
  .btn-add:active { transform: scale(0.97); }

  /* HERO */
  .hero {
    padding: 3.5rem 2rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; top: -60px; right: -40px;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(155,142,223,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -40px; left: 30%;
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(94,207,170,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 54px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 0.75rem;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { font-size: 16px; color: var(--muted); font-weight: 300; max-width: 480px; line-height: 1.6; }
  .stats {
    display: flex; gap: 2rem; margin-top: 2rem;
  }
  .stat-item { }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  /* GENRES */
  .genre-bar {
    padding: 1.25rem 2rem;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .genre-pill {
    padding: 6px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .genre-pill:hover { border-color: var(--border2); color: var(--text); }
  .genre-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
  .genre-dot { width: 7px; height: 7px; border-radius: 50%; }

  /* GRID */
  .section-header {
    padding: 1.5rem 2rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
  .count-badge {
    font-size: 12px; color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 2px 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    border-top: 1px solid var(--border);
  }
  .card {
    background: var(--surface);
    padding: 0;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--surface2); }
  .card:hover .card-play { opacity: 1; transform: scale(1); }
  .card-art {
    height: 140px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    position: relative;
    overflow: hidden;
  }
  .card-play {
    position: absolute; bottom: 10px; right: 10px;
    width: 36px; height: 36px;
    background: var(--text);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.2s, transform 0.2s;
    color: var(--bg);
    font-size: 13px;
  }
  .card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-artist { font-size: 13px; color: var(--muted); }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .genre-tag {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    font-weight: 400;
  }
  .dur { font-size: 11px; color: var(--muted); }
  .playing-indicator {
    position: absolute; top: 10px; left: 10px;
    display: flex; gap: 2px; align-items: flex-end; height: 14px;
  }
  .bar { width: 3px; background: var(--text); border-radius: 2px; animation: bounce 0.8s ease-in-out infinite alternate; }
  .bar:nth-child(2) { animation-delay: 0.2s; }
  .bar:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { from { height: 4px; } to { height: 14px; } }

  .empty-state {
    grid-column: 1 / -1;
    padding: 5rem 2rem;
    text-align: center;
    color: var(--muted);
  }
  .empty-state p { font-size: 15px; margin-top: 8px; }

  /* PLAYER */
  .player {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: rgba(22,22,24,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    height: 80px;
    padding: 0 2rem;
    display: none; align-items: center; gap: 1.5rem;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .player.visible { display: flex; transform: translateY(0); }
  .player-art {
    width: 48px; height: 48px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .player-info { flex: 1; min-width: 0; }
  .player-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-artist { font-size: 12px; color: var(--muted); }
  .player-controls { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
  .ctrl {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s;
  }
  .ctrl:hover { border-color: var(--border2); color: var(--text); }
  .ctrl.main { background: var(--text); color: var(--bg); border-color: var(--text); font-size: 15px; width: 44px; height: 44px; }
  .ctrl.main:hover { opacity: 0.85; }
  .progress-wrap {
    flex: 1; max-width: 320px; min-width: 80px;
    display: flex; align-items: center; gap: 10px;
  }
  .progress-bar {
    flex: 1; height: 3px;
    background: var(--surface2);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--text);
    width: 0%;
    transition: width 0.5s linear;
    border-radius: 2px;
  }
  .time { font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 2rem;
    width: 100%; max-width: 420px;
    animation: slideUp 0.25s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group select option { background: var(--surface2); }
  .form-group input:focus, .form-group select:focus { border-color: var(--border2); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.5rem; justify-content: flex-end; }
  .btn-cancel {
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px; padding: 9px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }
  .btn-save {
    background: var(--text); color: var(--bg); border: none;
    border-radius: 8px; padding: 9px 20px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .delete-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.5); border: none;
    color: var(--muted); font-size: 14px;
    width: 26px; height: 26px;
    border-radius: 50%; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    transition: color 0.15s;
    z-index: 10;
  }
  .card:hover .delete-btn { display: flex; }
  .delete-btn:hover { color: #e87d7d; }

  @media (max-width: 600px) {
    header { padding: 0 1rem; }
    .hero { padding: 2rem 1rem 1.5rem; }
    .genre-bar { padding: 1rem; }
    .section-header { padding: 1rem 1rem 0.5rem; }
    .progress-wrap { display: none; }
    .player { padding: 0 1rem; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">♪</div>
    Soundshelf
  </div>
  <div class="search-bar">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search songs or artists…" oninput="renderGrid()">
  </div>
  <div class="header-actions">
    <button class="btn-add" onclick="openModal()">
      <span>+</span> Add Song
    </button>
  </div>
</header>

<section class="hero">
  <h1>Your music,<br><em>beautifully stored.</em></h1>
  <p>A personal library where everyone can discover, browse, and enjoy your curated collection of music.</p>
  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" id="stat-songs">0</div>
      <div class="stat-label">Songs</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-artists">0</div>
      <div class="stat-label">Artists</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" id="stat-genres">0</div>
      <div class="stat-label">Genres</div>
    </div>
  </div>
</section>

<div class="genre-bar" id="genre-bar"></div>

<div class="section-header">
  <span class="section-title">Collection</span>
  <span class="count-badge" id="count-badge">0 songs</span>
</div>

<div class="grid" id="grid"></div>

<!-- Player -->
<div class="player" id="player">
  <div class="player-art" id="p-art"></div>
  <div class="player-info">
    <div class="player-title" id="p-title">—</div>
    <div class="player-artist" id="p-artist">—</div>
  </div>
  <div class="progress-wrap">
    <span class="time" id="p-time">0:00</span>
    <div class="progress-bar"><div class="progress-fill" id="p-fill"></div></div>
    <span class="time" id="p-dur">0:00</span>
  </div>
  <div class="player-controls">
    <button class="ctrl" onclick="prevSong()" title="Previous">&#9664;&#9664;</button>
    <button class="ctrl main" id="p-playbtn" onclick="togglePlay()">&#9654;</button>
    <button class="ctrl" onclick="nextSong()" title="Next">&#9654;&#9654;</button>
    <button class="ctrl" onclick="closePlayer()" title="Close">&#x2715;</button>
  </div>
</div>

<!-- Add Song Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOut(event)">
  <div class="modal">
    <h2>Add a song</h2>
    <div class="form-group">
      <label>Song title</label>
      <input type="text" id="f-title" placeholder="e.g. Midnight Bloom">
    </div>
    <div class="form-group">
      <label>Artist</label>
      <input type="text" id="f-artist" placeholder="e.g. Luna Wave">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Genre</label>
        <select id="f-genre">
          <option>Electronic</option>
          <option>Rock</option>
          <option>Jazz</option>
          <option>Folk</option>
          <option>Pop</option>
          <option>Hip-Hop</option>
          <option>Classical</option>
          <option>R&B</option>
          <option>Metal</option>
          <option>Country</option>
          <option>Reggae</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Duration</label>
        <input type="text" id="f-dur" placeholder="e.g. 3:42">
      </div>
    </div>
    <div class="form-group">
      <label>Year (optional)</label>
      <input type="text" id="f-year" placeholder="e.g. 2024">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addSong()">Add to library</button>
    </div>
  </div>
</div>

<script>
const GENRE_COLORS = {
  Electronic: { bg:'rgba(155,142,223,0.18)', tag:'rgba(155,142,223,0.2)', text:'#c4baf0', art:'#1a1828', emoji:'⚡' },
  Rock:       { bg:'rgba(232,125,90,0.15)', tag:'rgba(232,125,90,0.2)', text:'#f0b09a', art:'#221510', emoji:'🎸' },
  Jazz:       { bg:'rgba(94,207,170,0.15)', tag:'rgba(94,207,170,0.2)', text:'#7ee8c4', art:'#0e1e18', emoji:'🎷' },
  Folk:       { bg:'rgba(232,184,75,0.15)', tag:'rgba(232,184,75,0.2)', text:'#f0d080', art:'#1e1a0a', emoji:'🌾' },
  Pop:        { bg:'rgba(232,125,168,0.15)', tag:'rgba(232,125,168,0.2)', text:'#f0a0c8', art:'#201018', emoji:'✨' },
  'Hip-Hop':  { bg:'rgba(93,168,232,0.15)', tag:'rgba(93,168,232,0.2)', text:'#90c8f5', art:'#0e1620', emoji:'🎤' },
  Classical:  { bg:'rgba(200,184,162,0.15)', tag:'rgba(200,184,162,0.2)', text:'#d8c8b0', art:'#1a1810', emoji:'🎻' },
  'R&B':      { bg:'rgba(180,100,220,0.15)', tag:'rgba(180,100,220,0.2)', text:'#d090f0', art:'#180d20', emoji:'🎵' },
  Metal:      { bg:'rgba(150,150,150,0.15)', tag:'rgba(150,150,150,0.2)', text:'#c0c0c0', art:'#141414', emoji:'🤘' },
  Country:    { bg:'rgba(200,140,80,0.15)', tag:'rgba(200,140,80,0.2)', text:'#e0b880', art:'#1e1608', emoji:'🤠' },
  Reggae:     { bg:'rgba(80,200,100,0.15)', tag:'rgba(80,200,100,0.2)', text:'#80e898', art:'#0a1a0c', emoji:'🌴' },
  Other:      { bg:'rgba(140,135,132,0.15)', tag:'rgba(140,135,132,0.2)', text:'#b0aba8', art:'#161614', emoji:'🎼' },
};

const STORAGE_KEY = 'soundshelf_songs_v1';

const DEFAULT_SONGS = [
  { id:1, title:'Midnight Bloom', artist:'Luna Wave', genre:'Electronic', duration:'3:42', year:'2023' },
  { id:2, title:'Desert Road', artist:'The Wanderers', genre:'Rock', duration:'4:11', year:'2022' },
  { id:3, title:'River Soul', artist:'Amara Jones', genre:'Jazz', duration:'5:03', year:'2021' },
  { id:4, title:'Golden Fields', artist:'Sam Rivers', genre:'Folk', duration:'3:55', year:'2024' },
  { id:5, title:'City Rain', artist:'Nova Skies', genre:'Pop', duration:'3:17', year:'2023' },
  { id:6, title:'Smoky Blues', artist:'Reggie Cole', genre:'Jazz', duration:'6:14', year:'2020' },
  { id:7, title:'Wildfire', artist:'The Wanderers', genre:'Rock', duration:'4:33', year:'2022' },
  { id:8, title:'Deep Dive', artist:'DJ Kova', genre:'Electronic', duration:'5:55', year:'2024' },
  { id:9, title:'Sunday Morning', artist:'Sam Rivers', genre:'Folk', duration:'3:48', year:'2023' },
  { id:10, title:'Neon Pulse', artist:'DJ Kova', genre:'Electronic', duration:'3:28', year:'2024' },
  { id:11, title:'Soft Pillow', artist:'Amara Jones', genre:'Pop', duration:'3:01', year:'2023' },
  { id:12, title:'Mountain Echo', artist:'Forrest Hale', genre:'Folk', duration:'4:22', year:'2022' },
];

function loadSongs() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    return stored ? JSON.parse(stored) : [...DEFAULT_SONGS];
  } catch { return [...DEFAULT_SONGS]; }
}
function saveSongs(s) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} }

let songs = loadSongs();
let activeGenre = 'All';
let currentIndex = null;
let isPlaying = false;
let progressInterval = null;
let progressSec = 0;

// ---- Genres ----
function getGenres() { return ['All', ...new Set(songs.map(s => s.genre))]; }
function renderGenreBar() {
  const genres = getGenres();
  document.getElementById('genre-bar').innerHTML = genres.map(g => {
    const c = GENRE_COLORS[g];
    const dot = g !== 'All' ? `<span class="genre-dot" style="background:${c ? c.text : '#aaa'}"></span>` : '';
    return `<button class="genre-pill${g===activeGenre?' active':''}" onclick="setGenre('${g}')">${dot}${g}</button>`;
  }).join('');
}

function setGenre(g) { activeGenre = g; renderGenreBar(); renderGrid(); }

// ---- Grid ----
function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return songs.filter(s =>
    (activeGenre === 'All' || s.genre === activeGenre) &&
    (!q || s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q))
  );
}

function renderGrid() {
  const list = getFiltered();
  const grid = document.getElementById('grid');
  document.getElementById('count-badge').textContent = list.length + ' song' + (list.length!==1?'s':'');

  // Stats
  document.getElementById('stat-songs').textContent = songs.length;
  document.getElementById('stat-artists').textContent = new Set(songs.map(s=>s.artist)).size;
  document.getElementById('stat-genres').textContent = new Set(songs.map(s=>s.genre)).size;

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div style="font-size:40px">♪</div><p>No songs found. Try a different search or add one!</p></div>`;
    return;
  }

  grid.innerHTML = list.map((s, i) => {
    const c = GENRE_COLORS[s.genre] || GENRE_COLORS.Other;
    const isNowPlaying = currentIndex !== null && songs[currentIndex] && songs[currentIndex].id === s.id && isPlaying;
    const indicator = isNowPlaying ? `<div class="playing-indicator"><div class="bar" style="height:6px"></div><div class="bar" style="height:10px"></div><div class="bar" style="height:8px"></div></div>` : '';
    return `
    <div class="card" onclick="playSong(${songs.indexOf(s)})">
      <button class="delete-btn" onclick="event.stopPropagation();deleteSong(${s.id})" title="Remove">✕</button>
      <div class="card-art" style="background:${c.art}; font-size:44px">
        ${indicator}
        ${c.emoji}
        <div class="card-play">&#9654;</div>
      </div>
      <div class="card-body">
        <div class="card-title">${s.title}</div>
        <div class="card-artist">${s.artist}${s.year ? ' · ' + s.year : ''}</div>
        <div class="card-meta">
          <span class="genre-tag" style="background:${c.tag};color:${c.text}">${s.genre}</span>
          <span class="dur">${s.duration || '—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ---- Player ----
function playSong(idx) {
  currentIndex = idx;
  isPlaying = true;
  const s = songs[idx];
  const c = GENRE_COLORS[s.genre] || GENRE_COLORS.Other;
  document.getElementById('p-art').textContent = c.emoji;
  document.getElementById('p-art').style.background = c.art;
  document.getElementById('p-title').textContent = s.title;
  document.getElementById('p-artist').textContent = s.artist;
  document.getElementById('p-playbtn').innerHTML = '&#9646;&#9646;';
  const player = document.getElementById('player');
  player.style.display = 'flex';
  setTimeout(() => player.classList.add('visible'), 10);
  startProgress(s.duration);
  renderGrid();
}

function parseDur(d) {
  if (!d) return 180;
  const parts = d.split(':').map(Number);
  return parts[0]*60 + (parts[1]||0);
}
function fmtTime(sec) {
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return m + ':' + String(s).padStart(2,'0');
}

function startProgress(durStr) {
  clearInterval(progressInterval);
  progressSec = 0;
  const total = parseDur(durStr);
  document.getElementById('p-dur').textContent = fmtTime(total);
  document.getElementById('p-fill').style.width = '0%';
  document.getElementById('p-time').textContent = '0:00';
  progressInterval = setInterval(() => {
    if (!isPlaying) return;
    progressSec++;
    if (progressSec >= total) { progressSec = 0; nextSong(); return; }
    document.getElementById('p-fill').style.width = (progressSec/total*100) + '%';
    document.getElementById('p-time').textContent = fmtTime(progressSec);
  }, 1000);
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('p-playbtn').innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
  renderGrid();
}
function prevSong() {
  if (currentIndex === null) return;
  currentIndex = (currentIndex - 1 + songs.length) % songs.length;
  playSong(currentIndex);
}
function nextSong() {
  if (currentIndex === null) return;
  currentIndex = (currentIndex + 1) % songs.length;
  playSong(currentIndex);
}
function closePlayer() {
  clearInterval(progressInterval);
  isPlaying = false; currentIndex = null;
  const p = document.getElementById('player');
  p.classList.remove('visible');
  setTimeout(() => { if (!p.classList.contains('visible')) p.style.display = 'none'; }, 300);
  renderGrid();
}

// ---- Modal ----
function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('f-title').focus(); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }
function closeModalOut(e) { if (e.target === document.getElementById('modal')) closeModal(); }

function addSong() {
  const title = document.getElementById('f-title').value.trim();
  const artist = document.getElementById('f-artist').value.trim();
  const genre = document.getElementById('f-genre').value;
  const duration = document.getElementById('f-dur').value.trim();
  const year = document.getElementById('f-year').value.trim();
  if (!title || !artist) { alert('Please fill in at least the song title and artist.'); return; }
  const newSong = { id: Date.now(), title, artist, genre, duration: duration || '?', year };
  songs.unshift(newSong);
  saveSongs(songs);
  ['f-title','f-artist','f-dur','f-year'].forEach(id => document.getElementById(id).value = '');
  closeModal();
  renderGenreBar();
  renderGrid();
}

function deleteSong(id) {
  if (!confirm('Remove this song from the library?')) return;
  songs = songs.filter(s => s.id !== id);
  saveSongs(songs);
  renderGenreBar();
  renderGrid();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); if (currentIndex !== null) togglePlay(); }
  if (e.code === 'ArrowRight') nextSong();
  if (e.code === 'ArrowLeft') prevSong();
  if (e.code === 'Escape') closeModal();
});

// Init
renderGenreBar();
renderGrid();
</script>
</body>
</html>
