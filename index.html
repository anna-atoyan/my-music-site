<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Music Site</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: #222;
}

/* KEEP YOUR ORIGINAL DESIGN STYLE */
.song {
  margin: 20px;
  padding: 15px;
  background: #1e1e1e;
  border-radius: 10px;
}

button {
  padding: 8px 15px;
  border: none;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  margin: 5px;
}

button:hover {
  background: #ff1e4d;
}

input, select {
  padding: 10px;
  margin: 10px;
  border-radius: 5px;
  border: none;
}

.section {
  margin-top: 30px;
}

.liked {
  background: gold;
  color: black;
}
</style>
</head>

<body>

<header>
  <h1>🎵 My Music Site</h1>
  <p>Simple music collection</p>
</header>

<input type="text" id="search" placeholder="Search songs..." onkeyup="filterSongs()">

<select id="categoryFilter" onchange="filterSongs()">
  <option value="all">All Genres</option>
</select>

<div id="content"></div>

<script>
const songs = [
  { title: "Pop Song", file: "song1.mp3", category: "pop" },
  { title: "Jazz Song", file: "song2.mp3", category: "jazz" },
  { title: "Armenian Duduk", file: "song3.mp3", category: "armenian" },
  { title: "Rock Anthem", file: "song4.mp3", category: "rock" },
  { title: "Rap Beat", file: "song5.mp3", category: "rap" },
  { title: "Electronic Wave", file: "song6.mp3", category: "electronic" }
];

let likedSongs = JSON.parse(localStorage.getItem("likes")) || [];

function populateGenres() {
  const select = document.getElementById("categoryFilter");
  const categories = [...new Set(songs.map(s => s.category))];

  categories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

function renderSongs(filteredSongs) {
  const content = document.getElementById("content");
  content.innerHTML = "";

  const categories = [...new Set(filteredSongs.map(s => s.category))];

  categories.forEach(cat => {
    const section = document.createElement("div");
    section.className = "section";

    section.innerHTML = `<h2>${cat.toUpperCase()}</h2>`;

    filteredSongs
      .filter(song => song.category === cat)
      .forEach(song => {
        const liked = likedSongs.includes(song.title) ? "liked" : "";

        section.innerHTML += `
          <div class="song">
            <h3>${song.title}</h3>
            <audio controls src="${song.file}"></audio><br>
            <button class="${liked}" onclick="toggleLike('${song.title}', this)">❤️</button>
          </div>
        `;
      });

    content.appendChild(section);
  });

  fixAudio();
}

function filterSongs() {
  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("categoryFilter").value;

  let filtered = songs.filter(song =>
    song.title.toLowerCase().includes(search)
  );

  if (category !== "all") {
    filtered = filtered.filter(song => song.category === category);
  }

  renderSongs(filtered);
}

function toggleLike(title, btn) {
  if (likedSongs.includes(title)) {
    likedSongs = likedSongs.filter(t => t !== title);
    btn.classList.remove("liked");
  } else {
    likedSongs.push(title);
    btn.classList.add("liked");
  }
  localStorage.setItem("likes", JSON.stringify(likedSongs));
}

function fixAudio() {
  const audios = document.querySelectorAll("audio");

  audios.forEach(audio => {
    audio.addEventListener("play", () => {
      audios.forEach(a => {
        if (a !== audio) {
          a.pause();
          a.currentTime = 0;
        }
      });
    });
  });
}

populateGenres();
renderSongs(songs);
</script>

</body>
</html>
