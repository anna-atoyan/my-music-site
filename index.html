<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Music Site</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: linear-gradient(90deg, #8B0000, #0033A0, #FF8C00);
    }

    .song {
      margin: 20px;
      padding: 15px;
      background: #1e1e1e;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }

    button {
      padding: 8px 15px;
      border: none;
      background: #ff4d6d;
      color: white;
      cursor: pointer;
      border-radius: 5px;
      margin: 5px;
    }

    button:hover {
      background: #ff1e4d;
    }

    input {
      padding: 10px;
      width: 60%;
      margin: 20px;
      border-radius: 5px;
      border: none;
    }

    .liked {
      background: gold !important;
      color: black;
    }
  </style>
</head>

<body>

<header>
  <h1>🎵 My Music Site</h1>
  <p>Enjoy Armenian vibes 🇦🇲</p>
</header>

<input type="text" id="search" placeholder="Search songs..." onkeyup="searchSongs()">

<div id="songs"></div>

<script>
const songs = [
  { title: "Song 1", file: "song1.mp3" },
  { title: "Song 2", file: "song2.mp3" },
  { title: "Song 3", file: "song3.mp3" }
];

let likedSongs = JSON.parse(localStorage.getItem("likes")) || [];

function displaySongs(list) {
  const container = document.getElementById("songs");
  container.innerHTML = "";

  list.forEach(song => {
    const liked = likedSongs.includes(song.title) ? "liked" : "";

    container.innerHTML += `
      <div class="song">
        <h3>${song.title}</h3>
        <audio controls src="${song.file}"></audio><br>
        <button onclick="toggleLike('${song.title}', this)" class="${liked}">❤️</button>
      </div>
    `;
  });

  fixAudio();
}

function fixAudio() {
  const audios = document.querySelectorAll("audio");
  audios.forEach(audio => {
    audio.addEventListener("play", () => {
      audios.forEach(a => {
        if (a !== audio) {
          a.pause();
          a.currentTime = 0;
        }
      });
    });
  });
}

function toggleLike(title, btn) {
  if (likedSongs.includes(title)) {
    likedSongs = likedSongs.filter(t => t !== title);
    btn.classList.remove("liked");
  } else {
    likedSongs.push(title);
    btn.classList.add("liked");
  }
  localStorage.setItem("likes", JSON.stringify(likedSongs));
}

function searchSongs() {
  const value = document.getElementById("search").value.toLowerCase();
  const filtered = songs.filter(s => s.title.toLowerCase().includes(value));
  displaySongs(filtered);
}

displaySongs(songs);
</script>

</body>
</html>
